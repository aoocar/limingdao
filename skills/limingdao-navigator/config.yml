# 黎明岛导航站 OpenClaw Skill 配置
# ================================

# Hugo 项目路径（书签 Markdown 文件所在的项目根目录）
# 如果 OpenClaw 和项目在同一机器上，使用绝对路径
# 如果不在同一机器上，可以留空，通过 API 获取数据
hugo_project_path: ""

# 导航站 URL（备用数据源）
site_url: "https://www.limingdao.com"

# 爬取配置
crawl:
  max_concurrent: 5           # 最大并发爬取数
  request_timeout: 15         # 单个请求超时时间（秒）
  cache_ttl_hours: 24         # 爬取结果缓存有效期（小时）
  user_agent: "LimingdaoBot/1.0 (+https://www.limingdao.com; Navigation Site Health Checker)"
  retry_count: 2              # 失败重试次数
  retry_delay: 3              # 重试间隔（秒）
  
  # 慢速响应阈值（毫秒），超过此值标记为"缓慢"
  slow_threshold_ms: 5000

# 排除爬取的域名（某些网站已知会阻止爬虫）
exclude_domains:
  - "localhost"
  - "127.0.0.1"

# 报告配置
report:
  output_format: "markdown"   # 报告格式：markdown / json
  include_slow_sites: true    # 报告中是否包含慢速网站
  include_content_preview: true  # 报告中是否包含内容预览
  max_preview_length: 200     # 内容预览最大长度（字符）
